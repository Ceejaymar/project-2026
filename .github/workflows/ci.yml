name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-{{ github.workflow }}-{{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome
        run: pnpm exec biome ci .

      - name: Type check
        run: pnpm typecheck

      - name: Build Next.js
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Install Chromium for Storybook tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Storybook component and accessibility tests
        id: storybook-tests
        run: pnpm test:storybook:ci

      - name: Publish Storybook test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Storybook UI tests
          path: reports/storybook-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Storybook test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-test-report
          path: reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Lighthouse CI
        run: pnpm lhci
